name: Sync to Gitee

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to sync (e.g., v1.0.0). Leave empty to sync latest release.'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_USER: ${{ secrets.GITEE_USER }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # 添加 Gitee 远程仓库
          git remote add gitee "https://$GITEE_USER:$GITEE_TOKEN@gitee.com/$GITEE_USER/novel-material-collector.git" 2>/dev/null || true

          # 推送所有分支和标签
          git push gitee --all --force
          git push gitee --tags --force

          echo "✅ 代码同步完成"

      - name: Get tag to sync
        id: get_tag
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_USER: ${{ secrets.GITEE_USER }}
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            # 使用手动指定的 tag
            TAG_NAME="${{ github.event.inputs.tag }}"
          elif [ "${{ github.ref }}" != "refs/heads/main" ]; then
            # 如果是 tag 触发，使用当前 tag
            TAG_NAME=${GITHUB_REF#refs/tags/}
          else
            # 手动触发但未指定 tag，获取最新 release
            LATEST_RELEASE=$(curl -s \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases/latest")
            TAG_NAME=$(echo "$LATEST_RELEASE" | jq -r '.tag_name')
          fi

          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "准备同步 Release: $TAG_NAME"

      - name: Sync Release to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_USER: ${{ secrets.GITEE_USER }}
        run: |
          TAG_NAME="${{ steps.get_tag.outputs.tag_name }}"

          echo "同步 Release: $TAG_NAME"

          # 获取 GitHub Release 信息
          RELEASE_INFO=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG_NAME}")

          if echo "$RELEASE_INFO" | jq -e '.message' | grep -q "Not Found"; then
            echo "❌ Release $TAG_NAME 不存在"
            exit 1
          fi

          RELEASE_BODY=$(echo "$RELEASE_INFO" | jq -r '.body // "See assets to download"')
          RELEASE_NAME=$(echo "$RELEASE_INFO" | jq -r '.name // "扫榜助手 $TAG_NAME"')

          # 转义 JSON 字符串中的特殊字符
          RELEASE_BODY=$(echo "$RELEASE_BODY" | jq -Rs .)
          RELEASE_NAME=$(echo "$RELEASE_NAME" | jq -Rs .)

          echo "Release name: $RELEASE_NAME"

          # 检查 Gitee Release 是否已存在
          EXISTING_RELEASE=$(curl -s \
            "https://gitee.com/api/v5/repos/$GITEE_USER/novel-material-collector/releases/tags/${TAG_NAME}?access_token=$GITEE_TOKEN")

          if echo "$EXISTING_RELEASE" | jq -e '.id' > /dev/null 2>&1; then
            echo "Release $TAG_NAME 已存在于 Gitee，跳过创建"
            exit 0
          fi

          # 在 Gitee 创建 Release
          RESPONSE=$(curl -s -X POST \
            "https://gitee.com/api/v5/repos/$GITEE_USER/novel-material-collector/releases" \
            -H "Content-Type: application/json" \
            -d "{
              \"access_token\": \"$GITEE_TOKEN\",
              \"tag_name\": \"$TAG_NAME\",
              \"name\": \"扫榜助手 $TAG_NAME\",
              \"body\": \"下载地址：https://gitee.com/$GITEE_USER/novel-material-collector/releases/tag/$TAG_NAME\",
              \"draft\": false
            }")

          echo "Gitee API 响应: $RESPONSE"

          if echo "$RESPONSE" | jq -e '.id' > /dev/null 2>&1; then
            echo "✅ Release 同步完成"
          else
            echo "❌ Release 创建失败"
            echo "$RESPONSE" | jq .
            exit 1
          fi
