<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景圆形 - 温暖的渐变色 -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA07A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F0F0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>
  
  <!-- 书本主体 -->
  <g transform="translate(130, 100)">
    <!-- 书脊 -->
    <rect x="0" y="20" width="30" height="280" fill="#E8E8E8" rx="3"/>
    
    <!-- 书页（左页） -->
    <rect x="30" y="20" width="110" height="280" fill="url(#bookGrad)" rx="3"/>
    
    <!-- 书页（右页） -->
    <rect x="140" y="20" width="110" height="280" fill="url(#bookGrad)" rx="3"/>
    
    <!-- 书本装饰线 -->
    <line x1="50" y1="50" x2="130" y2="50" stroke="#DDD" stroke-width="2"/>
    <line x1="50" y1="80" x2="120" y2="80" stroke="#DDD" stroke-width="2"/>
    <line x1="50" y1="110" x2="125" y2="110" stroke="#DDD" stroke-width="2"/>
    
    <!-- "爆款"文字 -->
    <text x="195" y="160" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="56" font-weight="bold" fill="#FF6B6B" text-anchor="middle">爆款</text>
    
    <!-- 书签 -->
    <polygon points="230,20 230,80 245,60 260,80 260,20" fill="#FFD93D"/>
  </g>
  
  <!-- 底部装饰 -->
  <ellipse cx="256" cy="430" rx="80" ry="15" fill="rgba(0,0,0,0.1)"/>
</svg>