name: Sync to Gitee

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_USER: ${{ secrets.GITEE_USER }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # 添加 Gitee 远程仓库
          git remote add gitee https://${{ secrets.GITEE_USER }}:${{ secrets.GITEE_TOKEN }}@gitee.com/${{ secrets.GITEE_USER }}/novel-material-collector.git
          
          # 推送所有分支和标签
          git push gitee --all --force
          git push gitee --tags --force

      - name: Sync Release to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_USER: ${{ secrets.GITEE_USER }}
        run: |
          # 获取当前 tag
          TAG_NAME=${GITHUB_REF#refs/tags/}
          
          # 获取 GitHub Release 信息
          RELEASE_INFO=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG_NAME}")
          
          RELEASE_BODY=$(echo "$RELEASE_INFO" | jq -r '.body')
          RELEASE_NAME=$(echo "$RELEASE_INFO" | jq -r '.name')
          
          # 在 Gitee 创建 Release
          curl -X POST \
            "https://gitee.com/api/v5/repos/${{ secrets.GITEE_USER }}/novel-material-collector/releases" \
            -H "Content-Type: application/json" \
            -d "{
              \"access_token\": \"${{ secrets.GITEE_TOKEN }}\",
              \"tag_name\": \"${TAG_NAME}\",
              \"name\": \"${RELEASE_NAME}\",
              \"body\": \"${RELEASE_BODY}\",
              \"draft\": false
            }"
