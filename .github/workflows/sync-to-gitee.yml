name: Sync to Gitee

# 在 Build and Release 成功完成后自动运行，避免两个 workflow 并行导致同步时拿不到 Release 产物
on:
  workflow_run:
    workflows: ["Build and Release"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to sync (e.g., v1.0.0). Leave empty to sync latest release.'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    # 只有 Build 成功或手动触发才跑
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Resolve tag
        id: get_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG_NAME="${{ github.event.inputs.tag }}"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            # Build and Release 由 push tag 触发时，head_branch 就是 tag 名
            REF="${{ github.event.workflow_run.head_branch }}"
            if [[ "$REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
              TAG_NAME="$REF"
            else
              echo "Build 不是由 tag 触发（head_branch=$REF），跳过同步"
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          else
            LATEST_RELEASE=$(curl -s \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases/latest")
            TAG_NAME=$(echo "$LATEST_RELEASE" | jq -r '.tag_name')
          fi

          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "准备同步 Release: $TAG_NAME"

      - name: Checkout repository
        if: steps.get_tag.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.get_tag.outputs.tag_name }}

      - name: Push code and tags to Gitee
        if: steps.get_tag.outputs.skip != 'true'
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_USER: ${{ secrets.GITEE_USER }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # 先更新 main 分支到 tag 对应的 commit，保证 Gitee 上 raw/main/latest.json 是最新的
          git fetch origin main
          git checkout main
          git merge --ff-only ${{ steps.get_tag.outputs.tag_name }} || true

          git remote add gitee "https://$GITEE_USER:$GITEE_TOKEN@gitee.com/$GITEE_USER/novel-material-collector.git" 2>/dev/null || true

          # 推送 main 和所有 tag
          git push gitee main --force
          git push gitee --tags --force

          echo "✅ 代码同步完成"

      - name: Download GitHub Release Assets
        if: steps.get_tag.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ steps.get_tag.outputs.tag_name }}"

          # 获取 GitHub Release 信息
          RELEASE_INFO=$(curl -s \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG_NAME}")

          if echo "$RELEASE_INFO" | jq -e '.message' | grep -q "Not Found"; then
            echo "❌ Release $TAG_NAME 不存在"
            exit 1
          fi

          RELEASE_ID=$(echo "$RELEASE_INFO" | jq -r '.id')
          echo "RELEASE_ID=$RELEASE_ID" >> $GITHUB_ENV

          # 创建下载目录
          mkdir -p release-assets
          cd release-assets

          # 下载所有附件
          echo "$RELEASE_INFO" | jq -r '.assets[] | "\(.name) \(.url)"' | while read -r name url; do
            echo "下载: $name"
            curl -L -H "Authorization: token $GITHUB_TOKEN" -H "Accept: application/octet-stream" -o "$name" "$url"
          done

          echo "✅ 下载完成"
          ls -lh

      - name: Create Gitee Release
        if: steps.get_tag.outputs.skip != 'true'
        id: create_release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_USER: ${{ secrets.GITEE_USER }}
        run: |
          TAG_NAME="${{ steps.get_tag.outputs.tag_name }}"

          # 检查 Gitee Release 是否已存在
          EXISTING_RELEASE=$(curl -s \
            "https://gitee.com/api/v5/repos/$GITEE_USER/novel-material-collector/releases/tags/${TAG_NAME}?access_token=$GITEE_TOKEN")

          if echo "$EXISTING_RELEASE" | jq -e '.id' > /dev/null 2>&1; then
            RELEASE_ID=$(echo "$EXISTING_RELEASE" | jq -r '.id')
            echo "Release $TAG_NAME 已存在，ID: $RELEASE_ID"
            echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 读取 latest.json 里的 releaseNotes 作为 Gitee Release body
          RELEASE_BODY=$(jq -r '.releaseNotes // "See assets to download and install this version."' latest.json)

          # 创建新 Release
          RESPONSE=$(curl -s -X POST \
            "https://gitee.com/api/v5/repos/$GITEE_USER/novel-material-collector/releases" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg token "$GITEE_TOKEN" \
              --arg tag "$TAG_NAME" \
              --arg name "扫榜助手 $TAG_NAME" \
              --arg body "$RELEASE_BODY" \
              '{access_token:$token, tag_name:$tag, name:$name, body:$body, target_commitish:"main", draft:false}')")

          if echo "$RESPONSE" | jq -e '.id' > /dev/null 2>&1; then
            RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id')
            echo "✅ Release 创建成功，ID: $RELEASE_ID"
            echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT
          else
            echo "❌ Release 创建失败"
            echo "$RESPONSE" | jq .
            exit 1
          fi

      - name: Upload Assets to Gitee
        if: steps.get_tag.outputs.skip != 'true'
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_USER: ${{ secrets.GITEE_USER }}
        run: |
          RELEASE_ID="${{ steps.create_release.outputs.release_id }}"

          # 上传所有附件
          cd release-assets
          for file in *; do
            if [ -f "$file" ]; then
              echo "上传: $file"

              # Gitee 上传附件 API
              RESPONSE=$(curl -s -X POST \
                "https://gitee.com/api/v5/repos/$GITEE_USER/novel-material-collector/releases/$RELEASE_ID/attach_files" \
                -H "Content-Type: multipart/form-data" \
                -F "access_token=$GITEE_TOKEN" \
                -F "file=@$file")

              if echo "$RESPONSE" | jq -e '.id' > /dev/null 2>&1; then
                echo "✅ $file 上传成功"
              else
                echo "⚠️ $file 上传失败"
                echo "$RESPONSE" | jq .
              fi
            fi
          done

          echo "✅ Release 同步完成"
          echo "https://gitee.com/$GITEE_USER/novel-material-collector/releases/tag/${{ steps.get_tag.outputs.tag_name }}"
